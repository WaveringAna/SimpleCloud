<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User - Simple Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-xl font-bold text-gray-900">Simple Cloud</h1>
                    </div>
                    <div class="ml-6 flex items-center space-x-8">
                        <a href="/" class="text-gray-600 hover:text-gray-900 inline-flex items-center px-3 py-2 text-sm font-medium">Files</a>
                        <a href="/users" class="border-b-2 border-blue-500 text-gray-900 inline-flex items-center px-3 py-2 text-sm font-medium">Users</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/profile" class="text-gray-600 hover:text-gray-900 inline-flex items-center px-3 py-2 text-sm font-medium">Profile</a>
                    <a href="/logout" class="text-gray-600 hover:text-gray-900 inline-flex items-center px-3 py-2 text-sm font-medium">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-md mx-auto">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Create New User</h2>

            {{if .Error}}
            <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-4" role="alert">
                <p class="text-red-700">{{.Error}}</p>
            </div>
            {{end}}

            <form method="POST" action="/users/create" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        Email address
                    </label>
                    <input id="email"
                           name="email"
                           type="email"
                           required
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="user@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <input id="password"
                           name="password"
                           type="password"
                           required
                           minlength="8"
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="••••••••">
                    <p class="mt-1 text-sm text-gray-500">Must be at least 8 characters</p>
                </div>

                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Create User
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
