<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Cloud</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <h1 class="text-xl font-bold text-gray-900">Simple Cloud</h1>
                    </div>
                </div>
                <div class="flex items-center">
                    <span class="text-gray-600 mr-4">{{.Email}}</span>
                    <a href="/logout" 
                       class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Upload Form -->
        <div class="mb-8 bg-white p-6 rounded-lg shadow-sm">
            <form hx-post="/upload" 
                  hx-target="#file-list" 
                  hx-swap="innerHTML"
                  hx-encoding="multipart/form-data"
                  class="flex gap-4">
                <input type="file" 
                       name="file" 
                       class="flex-1 p-2 border rounded text-gray-600"
                       required>
                <button type="submit" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                    Upload
                </button>
            </form>
        </div>

        <!-- File List -->
        <div id="file-list" class="bg-white rounded-lg shadow-sm overflow-hidden">
            {{template "file-list.html" .Files}}
        </div>
    </div>
</body>
</html>
