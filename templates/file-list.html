{{if .}}
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Size</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Uploaded</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {{range .}}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{.Name}}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.Size | formatBytes}}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.UploadedAt.Format "2006-01-02 15:04:05"}}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <div class="flex gap-4">
                        <a href="/files/{{.ID}}/download" 
                           class="text-blue-600 hover:text-blue-900 transition-colors duration-200">
                            Download
                        </a>
                        <button hx-delete="/files/{{.ID}}"
                                hx-target="#file-list"
                                class="text-red-600 hover:text-red-900 transition-colors duration-200">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
{{else}}
    <div class="p-8 text-center text-gray-500">
        No files uploaded yet
    </div>
{{end}}
