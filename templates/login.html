<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simple Cloud</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 to-indigo-100 min-h-screen">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="max-w-md w-full space-y-8 bg-white rounded-xl shadow-lg p-8">
            <!-- App Logo/Name -->
            <div class="text-center">
                <h1 class="text-3xl font-bold text-gray-900">Simple Cloud</h1>
                <p class="mt-2 text-sm text-gray-600">Welcome back! Please log in to your account.</p>
            </div>

            <!-- Error Messages -->
            {{if .}}
            <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-4"
                 role="alert">
                <p class="text-red-700">{{.}}</p>
            </div>
            {{end}}

            <!-- Login Form -->
            <form method="POST" 
                  action="/login"
                  class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">
                            Email address
                        </label>
                        <input id="email"
                               name="email"
                               type="email"
                               required
                               class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               placeholder="you@example.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            Password
                        </label>
                        <input id="password"
                               name="password"
                               type="password"
                               required
                               class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
